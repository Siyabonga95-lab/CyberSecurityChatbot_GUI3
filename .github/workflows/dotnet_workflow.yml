name: .NET Framework CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1
      with:
        nuget-version: 'latest'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1
    
    - name: Restore NuGet packages
      run: nuget restore CyberSecurityChatbotGit.sln
      # OR if you don't have a solution file:
      # run: nuget restore CyberSecurityChatbotGit.csproj
    
    - name: Build solution
      run: msbuild CyberSecurityChatbotGit.sln /p:Configuration=Release
      # OR if building a specific project:
      # run: msbuild CyberSecurityChatbotGit.csproj /p:Configuration=Release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: CyberSecurityChatbot
        path: bin\Release\
