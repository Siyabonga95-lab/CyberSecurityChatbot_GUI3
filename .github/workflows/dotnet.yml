name: .NET Framework CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore packages
      run: nuget restore CyberSecurityChatbotGUI/CyberSecurityChatbotGUI.csproj

    - name: Build
      run: msbuild CyberSecurityChatbotGUI/CyberSecurityChatbotGUI.csproj /p:Configuration=Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: chatbot-release
        path: CyberSecurityChatbotGUI/bin/Release/
